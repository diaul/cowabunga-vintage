<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8a4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5c32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="20" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="100" x2="600" y2="100" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="0" x2="150" y2="400" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="450" y1="0" x2="450" y2="400" stroke="#334155" stroke-width="0.5" opacity="0.3"/>

  <!-- Turtle shell (hexagonal shape) -->
  <g transform="translate(300, 155)" filter="url(#shadow)">
    <!-- Outer shell -->
    <polygon points="0,-85 74,-42 74,42 0,85 -74,42 -74,-42" fill="url(#shellGrad)" stroke="#34d399" stroke-width="2"/>

    <!-- Shell pattern - inner hexagons -->
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="none" stroke="#34d399" stroke-width="1" opacity="0.4"/>

    <!-- Shell division lines -->
    <line x1="0" y1="-85" x2="0" y2="-28" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="74" y1="-42" x2="24" y2="-14" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="74" y1="42" x2="24" y2="14" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="85" x2="0" y2="28" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="-74" y1="42" x2="-24" y2="14" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <line x1="-74" y1="-42" x2="-24" y2="-14" stroke="#34d399" stroke-width="1" opacity="0.5"/>

    <!-- MTG Mana pentagon in center -->
    <circle cx="0" cy="0" r="18" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <polygon points="0,-12 11.4,-3.7 7,9.7 -7,9.7 -11.4,-3.7" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>

    <!-- 5 mana dots -->
    <circle cx="0" cy="-11" r="3" fill="#f8fafc" opacity="0.9"/> <!-- W -->
    <circle cx="10.5" cy="-3.4" r="3" fill="#3b82f6" opacity="0.9"/> <!-- U -->
    <circle cx="6.5" cy="8.9" r="3" fill="#1e1b4b" opacity="0.9"/> <!-- B -->
    <circle cx="-6.5" cy="8.9" r="3" fill="#ef4444" opacity="0.9"/> <!-- R -->
    <circle cx="-10.5" cy="-3.4" r="3" fill="#22c55e" opacity="0.9"/> <!-- G -->
  </g>

  <!-- Ninja band across the shell -->
  <g transform="translate(300, 155)">
    <rect x="-90" y="-10" width="180" height="20" rx="4" fill="url(#bandGrad)" opacity="0.85"/>
    <!-- Band tails -->
    <polygon points="74,0 105,-15 100,-5 110,8 74,0" fill="#7c3aed" opacity="0.7"/>
    <polygon points="74,0 108,-8 102,5 112,18 74,0" fill="#6d28d9" opacity="0.5"/>
  </g>

  <!-- Title text -->
  <text x="300" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="36" fill="#f8fafc" filter="url(#glow)" letter-spacing="3">COWABUNGA</text>
  <text x="300" y="325" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="22" fill="#a78bfa" letter-spacing="8">VINTAGE</text>

  <!-- Subtitle -->
  <text x="300" y="360" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8" letter-spacing="2">LLM EVALUATION OF MTG CARDS</text>
</svg>
